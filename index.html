<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DARK IN Dashboard</title>
<style>
:root{--bg:#000;--panel:#080b12;--panel2:#0d1220;--line:#242b3d;--txt:#f6f7fb;--muted:#9ba6be;--gold:#ffd21f;--green:#00e070;--purple:#8a4dff;--red:#ff3b3b;--blue:#00c8ff;--card:#090f1c;}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--txt);font-family:'Segoe UI',Arial,sans-serif;font-size:14px}body{overflow-x:hidden}
.app{display:flex;min-height:100vh;background:radial-gradient(circle at top right,rgba(138,77,255,.13),transparent 38%),#000}
.sidebar{width:255px;min-width:255px;background:#02040a;border-right:1px solid #151923;padding:20px 14px;position:sticky;top:0;height:100vh;overflow:auto}
.logo{display:flex;gap:12px;align-items:center;margin-bottom:26px}.mark{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,#00c8ff,#8a4dff);display:flex;align-items:center;justify-content:center;font-weight:900;color:#000}
.logo h1{font-size:30px;margin:0;letter-spacing:-1px}.logo h1 span{color:var(--gold)}.logo small{display:block;color:var(--muted);font-size:11px;margin-top:-2px}
.nav button{width:100%;height:44px;border:1px solid #1e2535;background:#090d17;color:#fff;border-radius:12px;margin:5px 0;text-align:left;padding:0 13px;font-weight:800;cursor:pointer;transition:.18s}
.nav button:hover,.nav button.active{border-color:var(--gold);background:linear-gradient(90deg,rgba(255,210,31,.18),rgba(138,77,255,.12));box-shadow:0 0 0 1px rgba(255,210,31,.08) inset}
.userbox{margin-top:30px;border:1px solid #1e2535;border-radius:16px;padding:14px;background:#05070d;color:#cdd4e5}
.main{flex:1;padding:22px;min-width:0}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap}
h2{font-size:30px;margin:0 0 4px;font-weight:950;letter-spacing:-.7px}.sub{color:var(--muted);font-size:14px}
.controls{display:flex;gap:10px;flex-wrap:wrap}select,input{background:#0a0f1d;color:#fff;border:1px solid #293147;border-radius:12px;height:42px;padding:0 14px;font-weight:700;outline:none}input{min-width:240px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 18px}.tabs button{border:1px solid #293147;background:#0a0f1d;color:#fff;border-radius:12px;padding:12px 18px;font-weight:900;cursor:pointer}.tabs button.active{border-color:var(--gold);color:var(--gold);box-shadow:0 0 18px rgba(255,210,31,.16)}
.grid{display:grid;gap:14px}.kpis{grid-template-columns:repeat(6,minmax(150px,1fr))}.cards2{grid-template-columns:repeat(2,minmax(0,1fr))}.cards3{grid-template-columns:repeat(3,minmax(0,1fr))}.cards4{grid-template-columns:repeat(4,minmax(0,1fr))}
.card{background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.01)),var(--panel);border:1px solid #222a3d;border-radius:18px;padding:18px;box-shadow:0 18px 50px rgba(0,0,0,.25)}
.card.gold{border-color:rgba(255,210,31,.45)}.card.green{border-color:rgba(0,224,112,.35)}.card.purple{border-color:rgba(138,77,255,.45)}
.kpi .label{font-size:11px;color:#aeb8ce;text-transform:uppercase;font-weight:900;letter-spacing:.5px}.kpi .value{font-size:27px;font-weight:950;margin:7px 0 4px;white-space:nowrap}.kpi .hint{font-size:11px;color:var(--muted)}
.section{display:none}.section.active{display:block}.section-title{display:flex;align-items:end;justify-content:space-between;gap:12px;margin:18px 0 10px}.section-title h3{font-size:20px;margin:0}
table{width:100%;border-collapse:collapse;min-width:980px}th,td{border-bottom:1px solid #1e2638;padding:12px 10px;text-align:left;font-size:12px}th{color:#96dfff;background:#070c17;position:sticky;top:0;z-index:1;cursor:pointer}td{font-weight:750}tr:hover{background:rgba(255,255,255,.035)}.tablewrap{overflow:auto;border:1px solid #20283b;border-radius:14px;max-height:620px}
.badge{display:inline-flex;border:1px solid #26324b;border-radius:999px;padding:5px 9px;font-size:10px;font-weight:950;margin:2px}.badge.park{background:rgba(0,200,255,.18);color:#79e4ff}.badge.ext{background:rgba(0,224,112,.16);color:#6bffad}.badge.inativo{background:rgba(255,59,59,.18);color:#ff9c9c}
.namebtn{background:none;border:0;color:#fff;font-weight:950;cursor:pointer;text-align:left;padding:0;text-decoration:none}.namebtn:hover{color:var(--gold)}
.bar{height:10px;background:#151a28;border-radius:999px;overflow:hidden;margin-top:10px}.fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--gold));border-radius:999px}.fill.green{background:linear-gradient(90deg,#009646,#00e070)}.fill.red{background:linear-gradient(90deg,#9b1111,#ff3b3b)}
.rankitem{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e2638;padding:12px 0;gap:10px}.medal{font-size:24px;width:32px}.small{font-size:12px;color:var(--muted)}
.heat{display:grid;grid-template-columns:70px repeat(7,1fr);gap:5px;align-items:center}.heat div{padding:9px;border-radius:7px;text-align:center;font-size:12px;font-weight:850}.heat .head{color:#aaa;background:#060910}.h0{background:#16060b}.h1{background:#3a0711}.h2{background:#73101a}.h3{background:#b81920}.h4{background:#ff5d15;color:#111}.h5{background:#ffd21f;color:#111}
.barchart .row{display:grid;grid-template-columns:70px 1fr 70px;align-items:center;gap:10px;margin:10px 0}.barchart .track{height:22px;background:#111827;border-radius:9px;overflow:hidden}.barchart .barin{height:100%;background:linear-gradient(90deg,var(--purple),var(--blue));border-radius:9px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day{min-height:78px;background:#070c17;border:1px solid #20283b;border-radius:12px;padding:8px}.day strong{display:block;color:var(--gold)}.day b{font-size:18px}.day.good{border-color:rgba(0,224,112,.5);background:rgba(0,224,112,.07)}.day.mid{border-color:rgba(255,210,31,.45);background:rgba(255,210,31,.07)}.day.bad{border-color:rgba(255,59,59,.38);background:rgba(255,59,59,.07)}
.profile{display:grid;grid-template-columns:330px 1fr;gap:14px}.avatar{width:96px;height:96px;border-radius:28px;background:linear-gradient(135deg,var(--gold),var(--purple));display:flex;align-items:center;justify-content:center;font-size:34px;color:#000;font-weight:950;margin-bottom:14px}
.notice{border-left:4px solid var(--gold);padding:12px 14px;background:rgba(255,210,31,.07);border-radius:10px;color:#f5eabb;margin:12px 0}
@media(max-width:1100px){.app{display:block}.sidebar{position:relative;width:100%;height:auto;min-width:0}.kpis,.cards2,.cards3,.cards4,.profile{grid-template-columns:1fr}.main{padding:14px}table{min-width:900px}}
</style>
</head>

function money(v){return (v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function pct(v){return ((v||0)*100).toLocaleString('pt-BR',{maximumFractionDigits:1})+'%'}
function num(v){return (v||0).toLocaleString('pt-BR',{maximumFractionDigits:1})}
function isInactiveName(n){return [...INATIVOS].some(x=>n===x||n.startsWith(x)||x.includes(n));}
function getRows(month=null, team=null){let m=month||document.getElementById('monthFilter').value;let t=team||document.getElementById('teamFilter').value;return RAW.filter(r=>(m==='GERAL'||r.mes===m)&&(t==='GERAL'||r.equipe===t));}
function aggRows(rows){let a={casais:rows.length,vendas:0,ativos:0,cancelados:0,notour:0,vgv:0,brindes:0};rows.forEach(r=>{a.vendas+=r.vendas;a.ativos+=r.ativos;a.cancelados+=r.cancelados;a.notour+=r.notour;a.vgv+=r.vgv;a.brindes+=r.brindes;});a.ef=a.casais?a.vendas/a.casais:0;a.custo=a.casais?a.brindes/a.casais:0;return a;}
function daysFactor(rows){let days=[...new Set(rows.map(r=>r.data).filter(Boolean))].length;return days?30/days:0;}
function captadores(rows){return new Set(rows.map(r=>r.promotor).filter(Boolean)).size}
function aggregateBy(rows, role='promotor', includeInactive=true){let map={};rows.forEach(r=>{let name=r[role];if(!name)return;if(!includeInactive && role==='promotor' && r.inativo)return;let key=name+'|'+(role==='promotor'?r.equipe:'');if(!map[key])map[key]={nome:name,role:role,equipe:role==='promotor'?r.equipe:'',casais:0,vendas:0,ativos:0,cancelados:0,notour:0,vgv:0,brindes:0,inativo:role==='promotor'?r.inativo:false,dias:new Set()};let o=map[key];o.casais++;o.vendas+=r.vendas;o.ativos+=r.ativos;o.cancelados+=r.cancelados;o.notour+=r.notour;o.vgv+=r.vgv;o.brindes+=r.brindes;if(r.data)o.dias.add(r.data);});return Object.values(map).map(o=>{o.ef=o.casais?o.vendas/o.casais:0;o.custo=o.casais?o.brindes/o.casais:0;o.projCasais=o.dias.size?Math.round(o.casais/o.dias.size*30):0;o.projVGV=o.dias.size?o.vgv/o.dias.size*30:0;return o;});}
function kpi(label,value,hint,cls=''){return `<div class="card kpi ${cls}"><div class="label">${label}</div><div class="value">${value}</div><div class="hint">${hint||''}</div></div>`}
function kpisHTML(rows){let a=aggRows(rows), d=daysFactor(rows), cap=captadores(rows);return `<div class="grid kpis">${kpi('Casais',num(a.casais),'total correto','gold')}${kpi('Vendas',num(a.vendas),'ATIVO + CANCELADO','purple')}${kpi('Ativos',num(a.ativos),'contratos ativos','green')}${kpi('Cancelados',num(a.cancelados),'conta como venda','')}${kpi('NoTour',num(a.notour),'separado','')}${kpi('VGV Total',money(a.vgv),'valor geral vendido','gold')}${kpi('Brindes',money(a.brindes),'custo total','')}${kpi('Custo/Casal',money(a.custo),'brindes ÷ casais','')}${kpi('Eficiência',pct(a.ef),'vendas ÷ casais','green')}${kpi('Média/Captador',num(cap?a.casais/cap:0),'casais ÷ captadores','')}${kpi('Proj. Casais',num(Math.round(a.casais*d)),'até dia 30','purple')}${kpi('Proj. VGV',money(a.vgv*d),'até dia 30','purple')}</div>`}
function progress(label,cur,total){let p=total?Math.min(100,cur/total*100):0;return `<div style="margin:12px 0"><b>${label}</b><span style="float:right">${num(cur)} / ${num(total)} (${p.toFixed(1)}%)</span><div class="bar"><div class="fill" style="width:${p}%"></div></div></div>`}
function tablePeople(list, title='Ranking', limit=999){let q=document.getElementById('search').value.toUpperCase();let arr=list.filter(o=>!q||o.nome.includes(q)||o.equipe.includes(q)||o.role.toUpperCase().includes(q));arr.sort((a,b)=>{let av=a[sortKey]??0,bv=b[sortKey]??0;if(sortKey==='nome')return sortDir*a.nome.localeCompare(b.nome);return sortDir*(av-bv)});arr=arr.slice(0,limit);return `<div class="section-title"><h3>${title}</h3><span class="small">Clique no cabeçalho para ordenar. Clique no nome para abrir o perfil.</span></div><div class="tablewrap"><table><thead><tr><th onclick="setSort('nome')"># / Profissional</th><th>Equipe/Função</th><th onclick="setSort('casais')">Casais</th><th onclick="setSort('vendas')">Vendas</th><th onclick="setSort('ativos')">Ativos</th><th onclick="setSort('cancelados')">Cancel.</th><th onclick="setSort('notour')">NoTour</th><th onclick="setSort('vgv')">VGV</th><th onclick="setSort('brindes')">Brindes</th><th onclick="setSort('custo')">Custo/Casal</th><th onclick="setSort('ef')">Eficiência</th><th onclick="setSort('projCasais')">Proj. Casais</th><th onclick="setSort('projVGV')">Proj. VGV</th></tr></thead><tbody>${arr.map((o,i)=>`<tr><td>${i+1} &nbsp; <button class="namebtn" onclick="openPerson('${o.nome.replaceAll("'","\'")}')">${o.nome}</button>${o.inativo?' <span class="badge inativo">INATIVO</span>':''}</td><td><span class="badge ${o.equipe==='PARK'?'park':'ext'}">${o.equipe||'-'}</span><span class="badge">${o.role==='promotor'?'Promotor':o.role==='liner'?'Liner':'Closer'}</span></td><td>${num(o.casais)}</td><td>${num(o.vendas)}</td><td>${num(o.ativos)}</td><td>${num(o.cancelados)}</td><td>${num(o.notour)}</td><td>${money(o.vgv)}</td><td>${money(o.brindes)}</td><td>${money(o.custo)}</td><td>${pct(o.ef)}</td><td>${num(o.projCasais)}</td><td>${money(o.projVGV)}</td></tr>`).join('')}</tbody></table></div>`}
function teamCard(teamName, rows){let rowsT=rows.filter(r=>r.equipe===teamName);let a=aggRows(rowsT), cap=captadores(rowsT);let pctTotal=rows.length?a.casais/rows.length*100:0;return `<div class="card ${teamName==='PARK'?'purple':'green'}"><h3>${teamName}</h3><div class="small">${teamName==='PARK'?'Raphael Bueno':'Francisco Antonio'}</div><p>Casais <b style="float:right">${num(a.casais)}</b></p><p>Vendas <b style="float:right">${num(a.vendas)}</b></p><p>VGV <b style="float:right">${money(a.vgv)}</b></p><p>Ativos <b style="float:right">${num(a.ativos)}</b></p><p>Cancelados <b style="float:right">${num(a.cancelados)}</b></p><p>NoTour <b style="float:right">${num(a.notour)}</b></p><p>Brindes <b style="float:right">${money(a.brindes)}</b></p><p>Custo/Casal <b style="float:right">${money(a.custo)}</b></p><p>Eficiência <b style="float:right">${pct(a.ef)}</b></p><p>Média/Captador <b style="float:right">${num(cap?a.casais/cap:0)}</b></p><div class="bar"><div class="fill ${teamName==='EXTERNA'?'green':''}" style="width:${pctTotal}%"></div></div><b>${pctTotal.toFixed(1)}%</b></div>`}
function rankBox(title, list, key, formatter=x=>num(x)){let arr=[...list].sort((a,b)=>(b[key]??0)-(a[key]??0)).slice(0,3);let medals=['🥇','🥈','🥉'];return `<div class="card"><h3>${title}</h3>${arr.map((o,i)=>`<div class="rankitem"><div><span class="medal">${medals[i]}</span><button class="namebtn" onclick="openPerson('${o.nome.replaceAll("'","\'")}')">${o.nome}</button><br><span class="small">${o.equipe||'-'} • ${o.role==='promotor'?'Promotor':o.role==='liner'?'Liner':'Closer'}</span></div><b>${formatter(o[key])}</b></div>`).join('')}</div>`}
function renderDashboard(container, month='GERAL'){let oldMonth=document.getElementById('monthFilter').value;document.getElementById('monthFilter').value=month;let rows=getRows();let activeProm=aggregateBy(rows,'promotor',false);let allRows=rows;container.innerHTML=kpisHTML(rows)+`<div class="grid cards2" style="margin-top:14px">${teamCard('PARK',rows)}${teamCard('EXTERNA',rows)}</div><div class="grid cards2" style="margin-top:14px"><div class="card gold"><h3>Meta da Operação</h3>${progress('Casais',aggRows(rows).casais,meta.casais)}${progress('VGV',aggRows(rows).vgv,meta.vgv)}</div><div class="card purple"><h3>Super Meta da Operação</h3>${progress('Casais',aggRows(rows).casais,superMeta.casais)}${progress('VGV',aggRows(rows).vgv,superMeta.vgv)}</div></div>`+tablePeople(activeProm,'Ranking de Promotores Ativos');document.getElementById('monthFilter').value=oldMonth;}
function renderEquipes(){let rows=getRows();let park=rows.filter(r=>r.equipe==='PARK'), ext=rows.filter(r=>r.equipe==='EXTERNA');let html=`<div class="tabs"><button onclick="teamFilter.value='GERAL';renderAll()" class="${document.getElementById('teamFilter').value==='GERAL'?'active':''}">Geral</button><button onclick="teamFilter.value='PARK';renderAll()" class="${document.getElementById('teamFilter').value==='PARK'?'active':''}">PARK</button><button onclick="teamFilter.value='EXTERNA';renderAll()" class="${document.getElementById('teamFilter').value==='EXTERNA'?'active':''}">EXTERNA</button></div>`;html+=kpisHTML(rows)+`<div class="grid cards2" style="margin-top:14px">${teamCard('PARK',rows)}${teamCard('EXTERNA',rows)}</div>`;html+=tablePeople(aggregateBy(rows,'promotor',false),'Relatório completo da equipe selecionada');document.getElementById('equipesContent').innerHTML=html;}
function renderRankings(){let rows=getRows();let p=aggregateBy(rows,'promotor',false), l=aggregateBy(rows,'liner',true), c=aggregateBy(rows,'closer',true);document.getElementById('rankingsContent').innerHTML=`<div class="tabs"><button onclick="sortKey='vgv';sortDir=-1;renderRankings()">VGV</button><button onclick="sortKey='casais';sortDir=-1;renderRankings()">Casais</button><button onclick="sortKey='vendas';sortDir=-1;renderRankings()">Vendas</button><button onclick="sortKey='custo';sortDir=1;renderRankings()">Menor Custo</button><button onclick="sortKey='ef';sortDir=-1;renderRankings()">Eficiência</button><button onclick="sortKey='nome';sortDir=1;renderRankings()">A-Z</button></div>`+tablePeople(p,'Ranking Promotores Ativos')+tablePeople(l,'Ranking Liners')+tablePeople(c,'Ranking Closers');}
function renderTop3(){let rows=getRows();let p=aggregateBy(rows,'promotor',false), l=aggregateBy(rows,'liner',true), c=aggregateBy(rows,'closer',true);document.getElementById('top3Content').innerHTML=`<div class="grid cards3">${rankBox('Top 3 Promotores • Casais',p,'casais')}${rankBox('Top 3 Promotores • VGV',p,'vgv',money)}${rankBox('Top 3 Promotores • Menor Custo',[...p].filter(x=>x.casais>0).sort((a,b)=>a.custo-b.custo).slice(0,3),'custo',money)}${rankBox('Top 3 Liners • Vendas',l,'vendas')}${rankBox('Top 3 Closers • VGV',c,'vgv',money)}${rankBox('Top 3 Eficiência',p.filter(x=>x.vendas>0),'ef',pct)}</div>`}
function renderHorarios(){let rows=getRows();let by={};rows.forEach(r=>{if(!by[r.hora])by[r.hora]=[];by[r.hora].push(r)});let max=Math.max(1,...Object.values(by).map(v=>v.length));let bar=Object.keys(by).sort((a,b)=>a-b).map(h=>{let a=aggRows(by[h]);return `<div class="row"><b>${h.padStart(2,'0')}h</b><div class="track"><div class="barin" style="width:${a.casais/max*100}%"></div></div><span>${a.casais} casais</span></div>`}).join('');let heat='<div class="heat"><div class="head">Hora</div>'+['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(d=>`<div class="head">${d}</div>`).join('');for(let h=8;h<=20;h++){heat+=`<div class="head">${String(h).padStart(2,'0')}h</div>`;for(let d=1;d<=7;d++){let count=rows.filter(r=>new Date(r.data+'T00:00:00').getDay()===(d%7)&&r.hora===h).length;let cls='h'+Math.min(5,Math.floor(count/max*6));heat+=`<div class="${cls}">${count}</div>`}}heat+='</div>';document.getElementById('horariosContent').innerHTML=`<div class="grid cards2"><div class="card"><h3>Ranking visual por horário</h3><div class="barchart">${bar}</div></div><div class="card"><h3>Heatmap • Melhores e piores horários</h3>${heat}</div></div>`;}
function renderCalendar(){let rows=getRows();let by={};rows.forEach(r=>{by[r.data]=by[r.data]||[];by[r.data].push(r)});let days=Object.keys(by).sort();let max=Math.max(1,...Object.values(by).map(v=>v.length));let html='<div class="calendar">'+days.map(d=>{let a=aggRows(by[d]);let cls=a.casais>max*.66?'good':a.casais>max*.33?'mid':'bad';return `<div class="day ${cls}"><strong>${d.split('-').reverse().join('/')}</strong><b>${a.casais}</b><br><span class="small">Vendas: ${a.vendas}<br>VGV: ${money(a.vgv)}<br>NoTour: ${a.notour}</span></div>`}).join('')+'</div>';document.getElementById('calContent').innerHTML=`<div class="card"><h3>Calendário diário</h3>${html}</div>`;}
function personRows(name){return RAW.filter(r=>r.promotor===name||r.liner===name||r.closer===name)}
function renderIndividual(){let rows=getRows();let names=[...new Set(RAW.flatMap(r=>[r.promotor,r.liner,r.closer]).filter(Boolean))].sort();if(!selectedPerson)selectedPerson=names[0];let pr=personRows(selectedPerson);let a=aggRows(pr);let init=selectedPerson.split(' ').slice(0,2).map(x=>x[0]).join('');let byDay={};pr.forEach(r=>{byDay[r.data]=byDay[r.data]||[];byDay[r.data].push(r)});let bars=Object.keys(byDay).sort().map(d=>`<div class="row"><b>${d.slice(5).split('-').reverse().join('/')}</b><div class="track"><div class="barin" style="width:${Math.min(100,byDay[d].length/5*100)}%"></div></div><span>${byDay[d].length}</span></div>`).join('');document.getElementById('individualContent').innerHTML=`<div class="controls" style="margin-bottom:14px"><select onchange="selectedPerson=this.value;renderIndividual()">${names.map(n=>`<option ${n===selectedPerson?'selected':''}>${n}</option>`).join('')}</select></div><div class="profile"><div class="card gold"><div class="avatar">${init}</div><h2>${selectedPerson}</h2><div class="small">Relatório geral em página única</div><div class="notice">Quando o nome aparece como Promotor, Liner ou Closer, o sistema soma no relatório individual.</div></div><div>${kpisHTML(pr)}</div></div><div class="grid cards2" style="margin-top:14px"><div class="card"><h3>Evolução diária</h3><div class="barchart">${bars}</div></div><div class="card"><h3>Resumo individual</h3><p>Casais: <b>${a.casais}</b></p><p>Vendas: <b>${a.vendas}</b></p><p>Ativos: <b>${a.ativos}</b></p><p>Cancelados: <b>${a.cancelados}</b></p><p>NoTour: <b>${a.notour}</b></p><p>VGV: <b>${money(a.vgv)}</b></p><p>Brindes: <b>${money(a.brindes)}</b></p><p>Custo/Casal: <b>${money(a.custo)}</b></p><p>Eficiência: <b>${pct(a.ef)}</b></p></div></div>`;}
function renderInativos(){let rows=getRows();let list=aggregateBy(rows,'promotor',true).filter(o=>o.inativo);document.getElementById('inativosContent').innerHTML=`<div class="notice">Os inativos não aparecem nos rankings, mas seus resultados continuam somando no Geral e nas equipes.</div>`+tablePeople(list,'Aba de Inativos');}
function renderMetas(){let rows=getRows();let a=aggRows(rows), d=daysFactor(rows);document.getElementById('metasContent').innerHTML=`<div class="grid cards2"><div class="card gold"><h3>Meta da Operação</h3>${progress('600 Casais',a.casais,600)}${progress('R$ 13 Milhões',a.vgv,13000000)}<p>Projeção casais: <b>${num(Math.round(a.casais*d))}</b></p><p>Projeção VGV: <b>${money(a.vgv*d)}</b></p></div><div class="card purple"><h3>Super Meta da Operação</h3>${progress('720 Casais',a.casais,720)}${progress('R$ 15 Milhões',a.vgv,15000000)}<p>Faltam casais: <b>${num(Math.max(0,720-a.casais))}</b></p><p>Falta VGV: <b>${money(Math.max(0,15000000-a.vgv))}</b></p></div></div>`}
function renderAll(){if(current==='geral')renderDashboard(document.getElementById('geralContent'),'GERAL');if(current==='maio')renderDashboard(document.getElementById('maioContent'),'MAIO');if(current==='junho')renderDashboard(document.getElementById('junhoContent'),'JUNHO');if(current==='equipes')renderEquipes();if(current==='rankings')renderRankings();if(current==='top3')renderTop3();if(current==='horarios')renderHorarios();if(current==='calendario')renderCalendar();if(current==='individual')renderIndividual();if(current==='inativos')renderInativos();if(current==='metas')renderMetas();}
function show(id,btn){current=id;document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');let names={geral:'Visão Geral',maio:'Maio',junho:'Junho',equipes:'Equipes separadas',rankings:'Rankings',top3:'Top 3 por Função',horarios:'Ranking de Horários',calendario:'Calendário diário',individual:'Perfil Individual',inativos:'Inativos',metas:'Metas e Projeções'};document.getElementById('title').textContent=names[id];renderAll();}
function setSort(k){if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=(k==='nome'||k==='custo')?1:-1}renderAll();}
function openPerson(n){selectedPerson=n;document.querySelector('.nav button:nth-child(9)').click();}
renderAll();
</script>
</body></html>
