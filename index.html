const money=v=>(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}), num=v=>Math.round(v||0).toLocaleString('pt-BR'), pct=v=>(v||0).toFixed(1).replace('.',',')+'%';
function tab(id,b){document.querySelectorAll('.tabs').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active'); if(id==='rankings')ranking(); if(id==='profissionais')profile(); if(id==='calendario')calendar(); if(id==='brindes')gifts(); if(id==='projecoes')projections(); if(id==='dados')records();}
function card(l,v,s=''){return `<div class="card"><div class="label">${l}</div><div class="value">${v}</div><div class="small">${s}</div></div>`} function progress(v,green=false){return `<div class="progress"><div class="bar ${green?'green':''}" style="width:${Math.min(v,130)}%"></div></div><div class="small">${pct(v)}</div>`}
function init(){document.getElementById('datePill').innerText=`Dados até dia ${DATA.last_day}/06`; kpis(); teams(); top3(); ranking(); initProf(); profile(); calendar(); gifts(); projections(); records(); charts(); insight();}
function kpis(){let t=DATA.totals; document.getElementById('kpis').innerHTML=card('Casais totais',num(t.casais),`Projeção ${num(t.proj_casais)} até dia 30`)+card('Vendas totais',num(t.vendas),`Ativos ${num(t.ativos)} • Cancelados ${num(t.cancelados)}`)+card('VGV total',money(t.vgv),`Projeção ${money(t.proj_vgv)}`)+card('NoTour total',num(t.notour),'Coluna separada e totalizada')+card('Custo por casal',money(t.custo_casal),`Brindes ${money(t.brindes)} ÷ Casais`)+card('Eficiência geral',pct(t.eficiencia),'Vendas ÷ Casais')+card('Meta casais',`${num(t.casais)} / 720`,progress(t.casais/720*100))+card('Meta VGV',`${money(t.vgv)} / 15MM`,progress(t.vgv/15000000*100,true))+card('ROI dos brindes',`${Math.round(t.roi||0)}x`,'VGV ÷ Brindes')+card('VGV por casal',money(t.vgv_casal),'VGV ÷ Casais')}
function teamHTML(e){return `<div class="card"><div class="label">Equipe ${e.equipe}</div><div class="value">${num(e.casais)} casais</div><div class="split"><div>🛒 Vendas: <b>${num(e.vendas)}</b></div><div>🚫 NoTour: <b>${num(e.notour)}</b></div><div>✅ Ativos: <b>${num(e.ativos)}</b></div><div>❌ Cancelados: <b>${num(e.cancelados)}</b></div><div>💰 VGV: <b>${money(e.vgv)}</b></div><div>🎁 Brindes: <b>${money(e.brindes)}</b></div><div>💸 Custo/Casal: <b>${money(e.custo_casal)}</b></div><div>🎯 Eficiência: <b>${pct(e.eficiencia)}</b></div></div><hr style="border-color:#1e293b"><div class="small">Meta Casais ${num(e.casais)} / 360</div>${progress(e.perc_meta_casais)}<div class="small">Meta VGV ${money(e.vgv)} / R$ 7,5MM</div>${progress(e.perc_meta_vgv,true)}<div class="small">Projeção: ${num(e.proj_casais)} casais • ${money(e.proj_vgv)}</div></div>`}
function teams(){let h=DATA.teams.map(teamHTML).join('');document.getElementById('teamCards').innerHTML=h;document.getElementById('teamDetail').innerHTML=h}
function top3(){let tops=[['Top Casais','casais'],['Top VGV','vgv'],['Top Eficiência','eficiencia'],['Menor Custo/Casal','custo_casal']];document.getElementById('top3').innerHTML=tops.map(([title,key])=>{let arr=[...DATA.professionals].filter(x=>key!=='custo_casal'||x.casais>0).sort((a,b)=>key==='custo_casal'?a[key]-b[key]:b[key]-a[key]).slice(0,3);return `<div class="card"><div class="label">${title}</div>${arr.map((x,i)=>`<p><span class="medal">${['🥇','🥈','🥉'][i]}</span> <b>${x.nome}</b><br><span class="small">${key==='vgv'?money(x[key]):key==='eficiencia'?pct(x[key]):key==='custo_casal'?money(x[key]):num(x[key])}</span></p>`).join('')}</div>`}).join('')}
function ranking(){let key=document.getElementById('rankSort')?.value||'vgv', q=(document.getElementById('rankSearch')?.value||'').toUpperCase();let arr=[...DATA.professionals].filter(x=>x.nome.toUpperCase().includes(q));arr.sort((a,b)=>key==='nome_asc'?a.nome.localeCompare(b.nome):key==='custo_casal_asc'?a.custo_casal-b.custo_casal:key==='notour_asc'?a.notour-b.notour:(b[key]||0)-(a[key]||0));document.getElementById('rankTable').innerHTML='<thead><tr><th>#</th><th>Profissional</th><th>Casais</th><th>Vendas</th><th>Ativos</th><th>Cancel.</th><th>NoTour</th><th>VGV</th><th>Brindes</th><th>Custo/Casal</th><th>Eficiência</th><th>Proj. Casais</th><th>Proj. VGV</th></tr></thead><tbody>'+arr.map((x,i)=>`<tr><td><span class="badge">${i+1}</span></td><td><b>${x.nome}</b></td><td>${num(x.casais)}</td><td>${num(x.vendas)}</td><td>${num(x.ativos)}</td><td>${num(x.cancelados)}</td><td>${num(x.notour)}</td><td>${money(x.vgv)}</td><td>${money(x.brindes)}</td><td><b>${money(x.custo_casal)}</b></td><td>${pct(x.eficiencia)}</td><td>${num(x.proj_casais)}</td><td>${money(x.proj_vgv)}</td></tr>`).join('')+'</tbody>'}
function initProf(){document.getElementById('profSelect').innerHTML=[...DATA.professionals].sort((a,b)=>a.nome.localeCompare(b.nome)).map(p=>`<option>${p.nome}</option>`).join('')} let profChart=null;
function profile(){let nome=document.getElementById('profSelect').value||DATA.professionals[0].nome,p=DATA.professionals.find(x=>x.nome===nome), rows=DATA.professionals_team.filter(x=>x.nome===nome), rec=DATA.records.filter(r=>r.nome===nome), days=DATA.daily.map(d=>d.data), vals=days.map(d=>rec.filter(r=>r.data===d).length), meta=35;document.getElementById('profile').innerHTML=`<div class="grid kpis">${card('Casais',num(p.casais),`Meta individual ${meta}`)}${card('Vendas',num(p.vendas),`Ativos ${p.ativos} • Cancelados ${p.cancelados}`)}${card('NoTour',num(p.notour),'Total individual')}${card('VGV',money(p.vgv),`Proj. ${money(p.proj_vgv)}`)}${card('Brindes',money(p.brindes),`Custo/Casal ${money(p.custo_casal)}`)}${card('Eficiência',pct(p.eficiencia),'Vendas ÷ Casais')}${card('Projeção Casais',num(p.proj_casais),p.proj_casais>=meta?'🟢 Acima da meta':'🔴 Abaixo da meta')}${card('Ranking Geral','#'+p.rank,'Por VGV')}</div><div class="two grid" style="margin-top:16px"><div class="card"><div class="label">Gráfico diário de ${nome}</div><canvas id="profCanvas"></canvas></div><div class="card"><div class="label">Divisão por equipe</div><div class="tablewrap"><table><thead><tr><th>Equipe</th><th>Casais</th><th>Vendas</th><th>NoTour</th><th>VGV</th><th>Brindes</th><th>Custo/Casal</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.equipe}</td><td>${num(r.casais)}</td><td>${num(r.vendas)}</td><td>${num(r.notour)}</td><td>${money(r.vgv)}</td><td>${money(r.brindes)}</td><td>${money(r.custo_casal)}</td></tr>`).join('')}</tbody></table></div></div></div>`; if(profChart)profChart.destroy(); profChart=new Chart(document.getElementById('profCanvas'),{type:'bar',data:{labels:days.map(d=>d.slice(8,10)+'/'+d.slice(5,7)),datasets:[{label:'Casais',data:vals}]},options:{plugins:{legend:{labels:{color:'#fff'}}},scales:{x:{ticks:{color:'#cbd5e1'}},y:{ticks:{color:'#cbd5e1'},beginAtZero:true}}}})}
function calendar(){let map={};DATA.daily.forEach(d=>map[d.dia]=d);let h='';for(let i=1;i<=30;i++){let d=map[i];h+=`<div class="day"><b>Dia ${String(i).padStart(2,'0')}</b><br>${d?`👫 ${num(d.casais)} casais<br>🛒 ${num(d.vendas)} vendas<br>🚫 ${num(d.notour)} NoTour<br>💰 ${money(d.vgv)}<br>🎁 ${money(d.brindes)}`:'<span class="small">Sem dados</span>'}</div>`}document.getElementById('calendar').innerHTML=h}
function gifts(){let t=DATA.totals;document.getElementById('giftKpis').innerHTML=card('Brindes totais',money(t.brindes),'Soma dos brindes')+card('Custo médio por casal',money(t.custo_casal),'Brindes ÷ Casais')+card('Brinde por venda',money(t.brindes/(t.vendas||1)),'Brindes ÷ Vendas')+card('ROI Brindes',`${Math.round(t.roi||0)}x`,'VGV ÷ Brindes')+card('VGV por casal',money(t.vgv_casal),'VGV ÷ Casais');let arr=[...DATA.professionals].sort((a,b)=>b.brindes-a.brindes);document.getElementById('giftTable').innerHTML='<thead><tr><th>Profissional</th><th>Casais</th><th>Brindes</th><th>Custo/Casal</th><th>VGV</th><th>ROI</th></tr></thead><tbody>'+arr.map(x=>`<tr><td><b>${x.nome}</b></td><td>${num(x.casais)}</td><td>${money(x.brindes)}</td><td><b>${money(x.custo_casal)}</b></td><td>${money(x.vgv)}</td><td>${Math.round(x.roi||0)}x</td></tr>`).join('')+'</tbody>'}
function projections(){let t=DATA.totals;document.getElementById('projKpis').innerHTML=card('Projeção Casais Geral',`${num(t.proj_casais)} / 720`,t.proj_casais>=720?'🟢 Bate meta':'🔴 Abaixo da meta')+card('Projeção VGV Geral',`${money(t.proj_vgv)} / 15MM`,t.proj_vgv>=15000000?'🟢 Bate meta':'🔴 Abaixo')+card('Ritmo diário Casais',num(t.casais/DATA.last_day),'Média atual')+card('Ritmo diário VGV',money(t.vgv/DATA.last_day),'Média atual');let arr=[...DATA.professionals].sort((a,b)=>b.proj_casais-a.proj_casais);document.getElementById('projTable').innerHTML='<thead><tr><th>Profissional</th><th>Atual Casais</th><th>Proj. Casais</th><th>Status Meta 35</th><th>Atual VGV</th><th>Proj. VGV</th><th>Proj. Vendas</th></tr></thead><tbody>'+arr.map(x=>`<tr><td><b>${x.nome}</b></td><td>${num(x.casais)}</td><td><b>${num(x.proj_casais)}</b></td><td>${x.proj_casais>=35?'<span class="good">Acima</span>':'<span class="bad">Abaixo</span>'}</td><td>${money(x.vgv)}</td><td>${money(x.proj_vgv)}</td><td>${num(x.proj_vendas)}</td></tr>`).join('')+'</tbody>'}
function records(){let q=(document.getElementById('dataSearch')?.value||'').toUpperCase(),arr=DATA.records.filter(r=>Object.values(r).join(' ').toUpperCase().includes(q));document.getElementById('recordsTable').innerHTML='<thead><tr><th>Data</th><th>Equipe</th><th>Profissional</th><th>Local</th><th>Q/NQ</th><th>Status Atendimento</th><th>Status Contrato</th><th>Vendas</th><th>NoTour</th><th>VGV</th><th>Brindes</th></tr></thead><tbody>'+arr.map(r=>`<tr><td>${r.data}</td><td>${r.equipe}</td><td><b>${r.nome}</b></td><td>${r.local}</td><td>${r.qualificacao}</td><td>${r.status_atendimento}</td><td>${r.status_contrato||'-'}</td><td>${r.vendas}</td><td>${r.notour}</td><td>${money(r.vgv)}</td><td>${money(r.brindes)}</td></tr>`).join('')+'</tbody>'}
function charts(){let labels=DATA.daily.map(d=>d.data.slice(8,10)+'/'+d.data.slice(5,7));new Chart(document.getElementById('dailyCasais'),{type:'line',data:{labels,datasets:[{label:'Casais',data:DATA.daily.map(d=>d.casais),tension:.35}]},options:{plugins:{legend:{labels:{color:'#fff'}}},scales:{x:{ticks:{color:'#cbd5e1'}},y:{ticks:{color:'#cbd5e1'},beginAtZero:true}}}});new Chart(document.getElementById('dailyVgv'),{type:'bar',data:{labels,datasets:[{label:'VGV',data:DATA.daily.map(d=>d.vgv)}]},options:{plugins:{legend:{labels:{color:'#fff'}}},scales:{x:{ticks:{color:'#cbd5e1'}},y:{ticks:{color:'#cbd5e1',callback:v=>money(v)}}}}})}
function insight(){let t=DATA.totals,b=DATA.professionals[0],lc=[...DATA.professionals].filter(x=>x.casais>0).sort((a,b)=>a.custo_casal-b.custo_casal)[0];document.getElementById('insight').innerHTML=`A operação tem <b>${num(t.casais)} casais</b>, <b>${num(t.vendas)} vendas</b>, <b>${num(t.notour)} NoTour</b> e <b>${money(t.vgv)}</b> de VGV. O custo médio por casal está em <b>${money(t.custo_casal)}</b>. Projeção até dia 30: <b>${num(t.proj_casais)} casais</b> e <b>${money(t.proj_vgv)}</b>. Maior VGV individual: <b>${b.nome}</b>. Menor custo por casal: <b>${lc.nome}</b> com <b>${money(lc.custo_casal)}</b>.`}
