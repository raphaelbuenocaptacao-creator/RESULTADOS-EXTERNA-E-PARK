const VIEWS=['Geral','Maio','Junho','Equipes','PARK','EXTERNA','Promotores','Liners','Closers','Top 3','Horários','Calendário','Metas','Profissionais'];let viewName='Geral', sortKey='vgv', sortDir=-1, selectedPerson=null;
const $=id=>document.getElementById(id);function money(v){return BRL.format(v||0)}function n(v){return NUM.format(Math.round(v||0))}function pct(v){return (v||0).toFixed(1).replace('.',',')+'%'}function initials(s){return (s||'?').split(' ').filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase()}
function nav(){ $('nav').innerHTML=VIEWS.map(v=>`<button class="${viewName==v?'active':''}" onclick="setView('${v}')">${icon(v)} ${v}</button>`).join('')}function icon(v){return {Geral:'⚡',Maio:'📁',Junho:'📁',Equipes:'👥',PARK:'🔵',EXTERNA:'🟢',Promotores:'🙋',Liners:'🎯',Closers:'🤝','Top 3':'🏆','Horários':'🔥','Calendário':'📅',Metas:'🚀',Profissionais:'👤'}[v]||'•'}function setView(v){viewName=v;selectedPerson=null;render()}$('monthFilter').onchange=render;$('teamFilter').onchange=render;$('search').oninput=render;
function rawFiltered(){let m=$('monthFilter').value,t=$('teamFilter').value,q=$('search').value.toLowerCase();let arr=DATA.rows.filter(r=>(m=='Todos'||r.mes==m)&&(t=='Todos'||r.equipe==t)); if(viewName=='Maio')arr=arr.filter(r=>r.mes=='Maio'); if(viewName=='Junho')arr=arr.filter(r=>r.mes=='Junho'); if(viewName=='PARK')arr=arr.filter(r=>r.equipe=='PARK'); if(viewName=='EXTERNA')arr=arr.filter(r=>r.equipe=='EXTERNA'); if(q)arr=arr.filter(r=>(r.promotor+' '+r.liner+' '+r.closer+' '+r.equipe).toLowerCase().includes(q)); return arr}
function agg(arr){let s={casais:0,vendas:0,ativos:0,cancelados:0,notour:0,vgv:0,brindes:0,captadores:new Set(),dias:new Set(),maxday:1};arr.forEach(r=>{s.casais+=r.casais;s.vendas+=r.vendas;s.ativos+=r.ativos;s.cancelados+=r.cancelados;s.notour+=r.notour;s.vgv+=r.vgv;s.brindes+=r.brindes;if(r.promotor)s.captadores.add(r.promotor);s.dias.add(r.dia);let d=parseInt(r.dia.slice(-2));if(d>s.maxday)s.maxday=d});s.custo_casal=s.casais?s.brindes/s.casais:0;s.eficiencia=s.casais?s.vendas/s.casais*100:0;s.media_captador=s.captadores.size?s.casais/s.captadores.size:0;s.proj_casais=s.casais/s.maxday*30;s.proj_vgv=s.vgv/s.maxday*30;return s}
function kpis(s){return `<div class="grid kpis"><div class="card glow"><div class="kpi-label">Casais totais</div><div class="kpi-value">${n(s.casais)}</div><div class="kpi-sub">NoTour em coluna separada</div></div><div class="card"><div class="kpi-label">Vendas</div><div class="kpi-value">${n(s.vendas)}</div><div class="kpi-sub">Ativos ${n(s.ativos)} • Cancelados ${n(s.cancelados)}</div></div><div class="card"><div class="kpi-label">VGV</div><div class="kpi-value">${money(s.vgv)}</div><div class="kpi-sub">Projeção ${money(s.proj_vgv)}</div></div><div class="card"><div class="kpi-label">Brindes</div><div class="kpi-value">${money(s.brindes)}</div><div class="kpi-sub">Custo/casal ${money(s.custo_casal)}</div></div><div class="card"><div class="kpi-label">Eficiência</div><div class="kpi-value">${pct(s.eficiencia)}</div><div class="kpi-sub">Vendas ÷ casais • NoTour separado</div></div><div class="card"><div class="kpi-label">NoTour</div><div class="kpi-value">${n(s.notour)}</div><div class="kpi-sub">Total separado</div></div><div class="card"><div class="kpi-label">Média por captador</div><div class="kpi-value">${s.media_captador.toFixed(1).replace('.',',')}</div><div class="kpi-sub">Casais ÷ ${s.captadores.size||0} captadores</div></div><div class="card"><div class="kpi-label">Projeção casais</div><div class="kpi-value">${n(s.proj_casais)}</div><div class="kpi-sub">Até dia 30</div></div><div class="card"><div class="kpi-label">Ativos</div><div class="kpi-value">${n(s.ativos)}</div><div class="kpi-sub">Contratos ativos</div></div><div class="card"><div class="kpi-label">Cancelados</div><div class="kpi-value">${n(s.cancelados)}</div><div class="kpi-sub">Contam como venda</div></div></div>`}
function groupBy(arr,key){let m={};arr.forEach(r=>{let k=typeof key=='function'?key(r):r[key]; if(!m[k])m[k]=[];m[k].push(r)});return m}
function roleMetrics(arr,role){let col=role=='Promotor'?'promotor':role=='Liner'?'liner':'closer';return Object.entries(groupBy(arr.filter(r=>r[col]),col)).map(([nome,rows])=>({nome,role,...agg(rows),equipe:[...new Set(rows.map(r=>r.equipe))].join('/')}))}
function teamMetrics(arr){return Object.entries(groupBy(arr,'equipe')).map(([e,rows])=>({equipe:e,...agg(rows)}))}
function table(items,cols){items=[...items].sort((a,b)=>sortDir*((a[sortKey]||0)>(b[sortKey]||0)?1:(a[sortKey]||0)<(b[sortKey]||0)?-1:(a.nome||a.equipe||'').localeCompare(b.nome||b.equipe||'')));return `<div class="table-wrap"><table><thead><tr>${cols.map(c=>`<th onclick="sortBy('${c.k}')">${c.t}</th>`).join('')}</tr></thead><tbody>${items.map((it,i)=>`<tr onclick="${it.nome?`openPerson('${it.role||'Promotor'}','${String(it.nome).replaceAll("'","\\'")}')`:''}">${cols.map(c=>`<td>${c.f?c.f(it,i):it[c.k]}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function sortBy(k){sortDir=sortKey==k?-sortDir:-1;sortKey=k;render()}function rank(i){return `<span class="rank">${i+1}º</span>`}
function roleTag(r){return `<span class="tag ${r=='Promotor'?'prom':r=='Liner'?'liner':'closer'}">${r}</span>`}function teamTag(e){return `<span class="tag ${e=='PARK'?'park':'ext'}">${e}</span>`}
const cols=[{k:'rank',t:'#',f:(x,i)=>rank(i)},{k:'nome',t:'Nome',f:x=>`<b>${x.nome}</b><div class="mini">${x.role?roleTag(x.role):''}</div>`},{k:'equipe',t:'Equipe',f:x=>teamTag(x.equipe||'')},{k:'casais',t:'Casais',f:x=>n(x.casais)},{k:'vendas',t:'Vendas',f:x=>n(x.vendas)},{k:'vgv',t:'VGV',f:x=>money(x.vgv)},{k:'eficiencia',t:'Eficiência',f:x=>pct(x.eficiencia)},{k:'notour',t:'NoTour',f:x=>n(x.notour)},{k:'brindes',t:'Brindes',f:x=>money(x.brindes)},{k:'custo_casal',t:'Custo/Casal',f:x=>money(x.custo_casal)},{k:'proj_casais',t:'Proj. Casais',f:x=>n(x.proj_casais)}];
function general(){let arr=rawFiltered(),s=agg(arr),teams=teamMetrics(arr);return `${kpis(s)}<div class="section"><div class="section-head"><h3>Equipes separadas</h3><div class="mini">Clique em PARK ou EXTERNA para abrir o geral da equipe</div></div><div class="grid two">${teams.map(t=>`<div class="card team-card" onclick="setView('${t.equipe}')"><h3>${teamTag(t.equipe)} ${t.equipe}</h3><div class="grid three"><div><div class="kpi-label">Casais</div><div class="kpi-value">${n(t.casais)}</div></div><div><div class="kpi-label">Vendas</div><div class="kpi-value">${n(t.vendas)}</div></div><div><div class="kpi-label">VGV</div><div class="kpi-value">${money(t.vgv)}</div></div><div><div class="kpi-label">Custo/Casal</div><div class="kpi-value">${money(t.custo_casal)}</div></div><div><div class="kpi-label">Eficiência</div><div class="kpi-value">${pct(t.eficiencia)}</div></div><div><div class="kpi-label">Média/Captador</div><div class="kpi-value">${t.media_captador.toFixed(1).replace('.',',')}</div></div></div></div>`).join('')}</div></div>${metasBlock(s)}<div class="section"><div class="section-head"><h3>Ranking geral clicável</h3><div class="tabs"><button class="pill" onclick="sortBy('casais')">Casais</button><button class="pill" onclick="sortBy('vendas')">Vendas</button><button class="pill" onclick="sortBy('vgv')">VGV</button><button class="pill" onclick="sortBy('brindes')">Brindes</button><button class="pill" onclick="sortBy('custo_casal')">Custo/Casal</button><button class="pill" onclick="sortBy('eficiencia')">Eficiência</button></div></div>${table(roleMetrics(arr,'Promotor'),cols)}</div>`}
function teamView(team){let arr=rawFiltered().filter(r=>r.equipe==team),s=agg(arr);let prom=roleMetrics(arr,'Promotor');return `${kpis(s)}${metasBlock(s)}<div class="section"><div class="section-head"><h3>Todos do ${team}</h3><div class="mini">Geral da equipe + ranking interno</div></div>${table(prom,cols)}</div><div class="section grid three">${topCard(prom,'Top 3 Casais','casais')}${topCard(prom,'Top 3 Vendas','vendas')}${topCard(prom,'Top 3 VGV','vgv')}</div>`}
function roleView(role){let arr=rawFiltered(),items=roleMetrics(arr,role);return `<div class="section"><div class="section-head"><h3>${role}s</h3><div class="tabs"><button class="pill" onclick="sortBy('casais')">Casais</button><button class="pill" onclick="sortBy('vendas')">Vendas</button><button class="pill" onclick="sortBy('vgv')">VGV</button><button class="pill" onclick="sortBy('eficiencia')">Eficiência</button></div></div>${table(items,cols)}</div>`}
function topCard(items,title,key){let top=[...items].sort((a,b)=>(b[key]||0)-(a[key]||0)).slice(0,3);return `<div class="card"><h3>${title}</h3>${top.map((x,i)=>`<div style="display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)"><div class="medal">${['🥇','🥈','🥉'][i]}</div><div style="flex:1"><b>${x.nome}</b><div class="mini">${x.equipe} • ${key=='vgv'?money(x[key]):key.includes('custo')?money(x[key]):n(x[key])}</div></div></div>`).join('')}</div>`}
function top3(){let arr=rawFiltered();let prom=roleMetrics(arr,'Promotor'),lin=roleMetrics(arr,'Liner'),clo=roleMetrics(arr,'Closer');return `<div class="grid three">${topCard(prom,'Top 3 Promotores','casais')}${topCard(lin,'Top 3 Liners','vendas')}${topCard(clo,'Top 3 Closers','vendas')}</div><div class="section grid three">${topCard(prom,'Top 3 Promotores VGV','vgv')}${topCard(lin,'Top 3 Liners VGV','vgv')}${topCard(clo,'Top 3 Closers VGV','vgv')}</div>`}
function metasBlock(s){function metaCard(t,cas,vgv,cls){let pc=Math.min(100,s.casais/cas*100),pv=Math.min(100,s.vgv/vgv*100);return `<div class="card"><h3>${t}</h3><div class="kpi-label">Casais ${n(s.casais)} / ${n(cas)}</div><div class="progress"><div class="bar ${cls}" style="width:${pc}%"></div></div><div class="kpi-sub">${pct(s.casais/cas*100)} • Projeção ${n(s.proj_casais)}</div><br><div class="kpi-label">VGV ${money(s.vgv)} / ${money(vgv)}</div><div class="progress"><div class="bar ${cls}" style="width:${pv}%"></div></div><div class="kpi-sub">${pct(s.vgv/vgv*100)} • Projeção ${money(s.proj_vgv)}</div></div>`}return `<div class="section grid two">${metaCard('🎯 Meta da Operação',600,13000000,'purple')}${metaCard('🚀 Super Meta da Operação',720,15000000,'')}</div>`}
function horarios(){let arr=rawFiltered();let groups=Object.entries(groupBy(arr,'horario')).map(([horario,rows])=>({horario,...agg(rows)})).sort((a,b)=>parseInt(a.horario)-parseInt(b.horario));let max=Math.max(1,...groups.map(g=>g.casais));return `<div class="card"><div class="section-head"><h3>Ranking de horários visual</h3><div class="mini">Melhores e piores horários por casais, vendas e eficiência</div></div><div class="bars bigchart">${groups.map(g=>{let h=4+g.casais/max*230;let cls=g.casais>max*.7?'good':g.casais<max*.35?'bad':'';return `<div class="barcol"><div class="barv ${cls}" style="height:${h}px"><span>${n(g.casais)}</span></div><div class="barlabel">${g.horario}</div></div>`}).join('')}</div></div><div class="section heat">${groups.map(g=>`<div class="heatcell"><strong>${g.horario}</strong><div>👫 ${n(g.casais)}</div><div>🛒 ${n(g.vendas)}</div><div>🎯 ${pct(g.eficiencia)}</div><div>💰 ${money(g.vgv)}</div></div>`).join('')}</div><div class="section">${table(groups,[{k:'horario',t:'Horário'},{k:'casais',t:'Casais',f:x=>n(x.casais)},{k:'vendas',t:'Vendas',f:x=>n(x.vendas)},{k:'vgv',t:'VGV',f:x=>money(x.vgv)},{k:'eficiencia',t:'Eficiência',f:x=>pct(x.eficiencia)},{k:'notour',t:'NoTour',f:x=>n(x.notour)},{k:'custo_casal',t:'Custo/Casal',f:x=>money(x.custo_casal)}])}</div>`}
function calendario(){let arr=rawFiltered();let groups=Object.entries(groupBy(arr,'dia')).map(([dia,rows])=>({dia,day:parseInt(dia.slice(-2)),...agg(rows)})).sort((a,b)=>a.dia.localeCompare(b.dia));let max=Math.max(1,...groups.map(g=>g.casais));return `<div class="section-head"><h3>Calendário diário</h3><div class="mini">Verde = melhor resultado • Amarelo = médio • Vermelho = menor movimento</div></div><div class="calendar">${groups.map(g=>{let cls=g.casais>max*.66?'good':g.casais>max*.33?'mid':'bad';return `<div class="day ${cls}"><div class="num">Dia ${g.day}</div><div>👫 ${n(g.casais)}</div><div>🛒 ${n(g.vendas)}</div><div>🚫 ${n(g.notour)}</div><div>💰 ${money(g.vgv)}</div><div class="mini">Ef. ${pct(g.eficiencia)}</div></div>`}).join('')}</div>`}
function metas(){let s=agg(rawFiltered());return `${metasBlock(s)}<div class="section">${kpis(s)}</div>`}
function profissionais(){let arr=rawFiltered(),all=[...roleMetrics(arr,'Promotor'),...roleMetrics(arr,'Liner'),...roleMetrics(arr,'Closer')];return selectedPerson?personPage(selectedPerson.role,selectedPerson.nome):`<div class="section"><div class="section-head"><h3>Escolha uma pessoa</h3><div class="mini">Ao clicar abre um relatório geral em uma página somente</div></div>${table(all,cols)}</div>`}
function openPerson(role,nome){selectedPerson={role,nome};viewName='Profissionais';render()}
function personPage(role,nome){let col=role=='Promotor'?'promotor':role=='Liner'?'liner':'closer';let arr=rawFiltered().filter(r=>r[col]==nome);let s=agg(arr);let byday=Object.entries(groupBy(arr,'dia')).map(([dia,rows])=>({dia,day:parseInt(dia.slice(-2)),...agg(rows)})).sort((a,b)=>a.dia.localeCompare(b.dia));return `<button class="pill" onclick="selectedPerson=null;render()">← Voltar</button><div class="section profile"><div class="card"><div class="avatar">${initials(nome)}</div><h2>${nome}</h2>${roleTag(role)} <span>${teamTag([...new Set(arr.map(r=>r.equipe))].join('/'))}</span><p class="mini">Relatório geral individual em uma página.</p><div class="progress"><div class="bar" style="width:${Math.min(100,s.eficiencia)}%"></div></div><div class="mini">Eficiência ${pct(s.eficiencia)}</div></div><div>${kpis(s)}</div></div><div class="section grid two"><div class="card"><h3>Evolução diária</h3><div class="bars">${byday.map(g=>`<div class="barcol"><div class="barv" style="height:${4+g.casais/Math.max(1,...byday.map(x=>x.casais))*180}px"><span>${n(g.casais)}</span></div><div class="barlabel">${g.day}</div></div>`).join('')}</div></div><div class="card"><h3>Projeção individual</h3><div class="kpi-label">Casais projetados até dia 30</div><div class="kpi-value">${n(s.proj_casais)}</div><div class="kpi-label">VGV projetado</div><div class="kpi-value">${money(s.proj_vgv)}</div><div class="kpi-sub">Baseado no ritmo atual dessa pessoa</div></div></div><div class="section"><h3>Registros da pessoa</h3>${rawTable(arr)}</div>`}
function rawTable(arr){return `<div class="table-wrap"><table><thead><tr><th>Data</th><th>Equipe</th><th>Promotor</th><th>Liner</th><th>Closer</th><th>Local</th><th>Status</th><th>Vendas</th><th>NoTour</th><th>VGV</th><th>Brindes</th></tr></thead><tbody>${arr.map(r=>`<tr><td>${r.data}</td><td>${teamTag(r.equipe)}</td><td>${r.promotor}</td><td>${r.liner}</td><td>${r.closer}</td><td>${r.local}</td><td>${r.status_contrato||r.status_atendimento}</td><td>${n(r.vendas)}</td><td>${n(r.notour)}</td><td>${money(r.vgv)}</td><td>${money(r.brindes)}</td></tr>`).join('')}</tbody></table></div>`}
function render(){nav();$('pageTitle').textContent=icon(viewName)+' '+viewName;let html=''; if(viewName=='Geral'||viewName=='Maio'||viewName=='Junho')html=general(); else if(viewName=='Equipes')html=general(); else if(viewName=='PARK'||viewName=='EXTERNA')html=teamView(viewName); else if(viewName=='Promotores')html=roleView('Promotor'); else if(viewName=='Liners')html=roleView('Liner'); else if(viewName=='Closers')html=roleView('Closer'); else if(viewName=='Top 3')html=top3(); else if(viewName=='Horários')html=horarios(); else if(viewName=='Calendário')html=calendario(); else if(viewName=='Metas')html=metas(); else if(viewName=='Profissionais')html=profissionais(); $('view').innerHTML=html}
render();</script></body></html>
