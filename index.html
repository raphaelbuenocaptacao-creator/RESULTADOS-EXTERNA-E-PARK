function money(v){return MONEY.format(v||0)} function money2(v){return MONEY2.format(v||0)} function pct(v){return isFinite(v)?(v*100).toFixed(1).replace('.',',')+'%':'0,0%'} function safeDiv(a,b){return b? a/b:0} function norm(s){return (s||'').toString().toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function currentRows(extra={}){let m=extra.month||state.month; let q=norm(state.search); return DATA.filter(r=>(m==='TODOS'||r.mes===m)&&(!extra.team||r.equipe===extra.team)&&(!q||norm([r.promotor,r.local,r.liner,r.closer,r.lider].join(' ')).includes(q)));}

function aggregate(rows, by='promotor'){
 const map={}; rows.forEach(r=>{let key=r[by]||'SEM NOME'; if(!key)return; if(!map[key]) map[key]={nome:key, equipe:r.equipe, casais:0,vendas:0,ativos:0,cancelados:0,notour:0,vgv:0,brindes:0,dias:new Set(),hours:{},locais:{},roles:{promotor:0,liner:0,closer:0}, rows:[]}; let o=map[key]; o.casais++; o.vendas+=r.vendas; o.ativos+=r.ativos; o.cancelados+=r.cancelados; o.notour+=r.notour; o.vgv+=r.valor; o.brindes+=r.brindes; if(r.data)o.dias.add(r.data); if(r.hour!=null)o.hours[r.hour]=(o.hours[r.hour]||0)+1; if(r.local)o.locais[r.local]=(o.locais[r.local]||0)+1; o.rows.push(r); });
 return Object.values(map).map(o=>{o.diasTrabalhados=o.dias.size; o.ef=safeDiv(o.vendas,o.casais); o.custoCasal=safeDiv(o.brindes,o.casais); o.vgvCasal=safeDiv(o.vgv,o.casais); o.projCasais=Math.round(safeDiv(o.casais, Math.max(1,o.diasTrabalhados))*30); o.projVgv=safeDiv(o.vgv,Math.max(1,o.diasTrabalhados))*30; return o;});
}
function aggregateRole(rows, field){const m={}; rows.forEach(r=>{let key=r[field]; if(!key)return; if(!m[key])m[key]={nome:key,casais:0,vendas:0,ativos:0,cancelados:0,notour:0,vgv:0,brindes:0,dias:new Set(),rows:[]}; let o=m[key]; o.casais++; o.vendas+=r.vendas; o.ativos+=r.ativos; o.cancelados+=r.cancelados; o.notour+=r.notour; o.vgv+=r.valor; o.brindes+=r.brindes; if(r.data)o.dias.add(r.data); o.rows.push(r);}); return Object.values(m).map(o=>{o.diasTrabalhados=o.dias.size;o.ef=safeDiv(o.vendas,o.casais);o.custoCasal=safeDiv(o.brindes,o.casais);o.projCasais=Math.round(safeDiv(o.casais,Math.max(1,o.diasTrabalhados))*30);o.projVgv=safeDiv(o.vgv,Math.max(1,o.diasTrabalhados))*30;return o;});}
function totals(rows){let t=rows.reduce((a,r)=>{a.casais++;a.vendas+=r.vendas;a.ativos+=r.ativos;a.cancelados+=r.cancelados;a.notour+=r.notour;a.vgv+=r.valor;a.brindes+=r.brindes;if(r.data)a.dias.add(r.data);if(r.promotor)a.profs.add(r.promotor);return a},{casais:0,vendas:0,ativos:0,cancelados:0,notour:0,vgv:0,brindes:0,dias:new Set(),profs:new Set()}); t.ef=safeDiv(t.vendas,t.casais);t.custoCasal=safeDiv(t.brindes,t.casais);t.mediaCaptador=safeDiv(t.casais,t.profs.size);t.projCasais=Math.round(safeDiv(t.casais,Math.max(1,t.dias.size))*30);t.projVgv=safeDiv(t.vgv,Math.max(1,t.dias.size))*30;return t;}
function kpi(label,value,sub=''){return `<div class="card metric"><div class="label">${label}</div><div class="value">${value}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`}
function kpis(t){return `<div class="grid kpis">${kpi('👫 Casais Totais',NUM.format(t.casais),'Casais oficiais do filtro')}${kpi('🛒 Vendas Totais',NUM.format(t.vendas),'ATIVO + CANCELADO')}${kpi('✅ Ativos',NUM.format(t.ativos))}${kpi('❌ Cancelados',NUM.format(t.cancelados))}${kpi('🚫 NoTour',NUM.format(t.notour),'Separado da eficiência')}${kpi('💰 VGV Total',money(t.vgv))}${kpi('🎁 Brindes',money(t.brindes))}${kpi('💸 Custo/Casal',money2(t.custoCasal),'Brindes ÷ Casais')}${kpi('🎯 Eficiência',pct(t.ef),'Vendas ÷ Casais')}${kpi('👥 Média/Captador',t.mediaCaptador.toFixed(1).replace('.',','))}${kpi('🚀 Proj. Casais',NUM.format(t.projCasais),'Até dia 30')}${kpi('🚀 Proj. VGV',money(t.projVgv),'Até dia 30')}</div>`}
function progress(label,now,goal,cls=''){let p=Math.min(100,safeDiv(now,goal)*100); return `<div style="margin-top:14px"><div class="row"><span>${label}</span><b>${NUM.format(Math.round(now))} / ${NUM.format(goal)} • ${p.toFixed(1).replace('.',',')}%</b></div><div class="progress"><div class="bar ${cls}" style="width:${p}%"></div></div></div>`}
function teamCard(team,rows){let t=totals(rows.filter(r=>r.equipe===team)); return `<div class="card team-card ${team==='EXTERNA'?'ext':''} team-filter-card" onclick="openTeam('${team}')"><div class="row"><div><span class="badge ${team==='PARK'?'park':'ext'}">${team}</span><h3 style="font-size:28px;margin:12px 0 0">${team==='PARK'?'Equipe PARK':'Equipe EXTERNA'}</h3><p style="color:var(--muted);margin:7px 0 0">Clique para ver todos da equipe e o geral dela.</p></div><div style="font-size:42px">${team==='PARK'?'🔵':'🟣'}</div></div><div class="mini-grid"><div class="mini"><span>Casais</span><b>${NUM.format(t.casais)}</b></div><div class="mini"><span>Vendas</span><b>${NUM.format(t.vendas)}</b></div><div class="mini"><span>VGV</span><b>${money(t.vgv)}</b></div><div class="mini"><span>Custo/Casal</span><b>${money2(t.custoCasal)}</b></div><div class="mini"><span>NoTour</span><b>${NUM.format(t.notour)}</b></div><div class="mini"><span>Eficiência</span><b>${pct(t.ef)}</b></div><div class="mini"><span>Média/Captador</span><b>${t.mediaCaptador.toFixed(1).replace('.',',')}</b></div><div class="mini"><span>Projeção</span><b>${NUM.format(t.projCasais)}</b></div></div>${progress('Meta operação casais',t.casais,META.casais/2)}${progress('Super meta VGV',t.vgv,META.superVgv/2,'super')}</div>`}
function sorted(arr, sort=state.sort){let a=[...arr]; let key=sort; if(sort==='az') return a.sort((x,y)=>x.nome.localeCompare(y.nome)); return a.sort((x,y)=>(y[key]||0)-(x[key]||0));}
function table(arr, options={}){let sort=options.sort||state.sort; let data=sorted(arr,sort); let rank=0; return `<div class="table-wrap"><table><thead><tr><th>#</th><th class="sort" onclick="setSort('az')">Profissional</th><th>Equipe</th><th class="sort" onclick="setSort('casais')">Casais</th><th class="sort" onclick="setSort('vendas')">Vendas</th><th>Ativos</th><th>Cancelados</th><th class="sort" onclick="setSort('vgv')">VGV</th><th class="sort" onclick="setSort('notour')">NoTour</th><th class="sort" onclick="setSort('brindes')">Brindes</th><th class="sort" onclick="setSort('custoCasal')">Custo/Casal</th><th class="sort" onclick="setSort('ef')">Eficiência</th><th>Proj. Casais</th></tr></thead><tbody>${data.map(o=>{rank++; return `<tr><td>${rank}</td><td><a class="name-link" href="javascript:openProfile('${encodeURIComponent(o.nome)}')">${o.nome}</a></td><td><span class="badge ${o.equipe==='PARK'?'park':'ext'}">${o.equipe||'-'}</span></td><td>${NUM.format(o.casais)}</td><td>${NUM.format(o.vendas)}</td><td>${NUM.format(o.ativos)}</td><td>${NUM.format(o.cancelados)}</td><td>${money(o.vgv)}</td><td>${NUM.format(o.notour)}</td><td>${money(o.brindes)}</td><td>${money2(o.custoCasal)}</td><td>${pct(o.ef)}</td><td>${NUM.format(o.projCasais)}</td></tr>`}).join('')}</tbody></table></div>`}
function roleTable(arr,title){let data=sorted(arr,'vendas').slice(0,30); return `<div class="card"><h3>${title}</h3><div class="table-wrap"><table><thead><tr><th>#</th><th>Nome</th><th>Atendimentos</th><th>Vendas</th><th>Ativos</th><th>Cancelados</th><th>VGV</th><th>Eficiência</th><th>Proj.</th></tr></thead><tbody>${data.map((o,i)=>`<tr><td>${i+1}</td><td>${o.nome}</td><td>${o.casais}</td><td>${o.vendas}</td><td>${o.ativos}</td><td>${o.cancelados}</td><td>${money(o.vgv)}</td><td>${pct(o.ef)}</td><td>${o.projCasais}</td></tr>`).join('')}</tbody></table></div></div>`}
function podium(arr,title,metric='vendas'){let data=sorted(arr,metric).slice(0,3); const medals=['🥇','🥈','🥉']; return `<div class="card"><h3>${title}</h3><div class="podium">${data.map((o,i)=>`<div class="item"><div class="row" style="justify-content:flex-start"><div class="medal">${medals[i]}</div><div><b>${o.nome}</b><div style="color:var(--muted);font-size:12px">${metric==='vgv'?money(o[metric]):NUM.format(Math.round(o[metric]||0))} ${metric}</div></div></div><span class="badge good">${pct(o.ef||0)}</span></div>`).join('')||'<p style="color:var(--muted)">Sem dados</p>'}</div></div>`}
function barChart(items, labelKey='label', valueKey='value', maxItems=16){let data=[...items].slice(0,maxItems); let max=Math.max(1,...data.map(x=>x[valueKey]||0)); return `<div class="chart big"><div class="bars">${data.map(x=>`<div class="barcol" style="height:${Math.max(3,(x[valueKey]||0)/max*100)}%"><b>${NUM.format(x[valueKey]||0)}</b><span>${x[labelKey]}</span></div>`).join('')}</div></div>`}
function hourAgg(rows){const m={}; rows.forEach(r=>{if(r.hour==null)return; let h=String(r.hour).padStart(2,'0')+'h'; if(!m[h])m[h]={label:h,casais:0,vendas:0,vgv:0,notour:0}; m[h].casais++;m[h].vendas+=r.vendas;m[h].vgv+=r.valor;m[h].notour+=r.notour;}); return Object.values(m).sort((a,b)=>parseInt(a.label)-parseInt(b.label)).map(o=>{o.ef=safeDiv(o.vendas,o.casais); return o;});}
function heatmap(rows){let h=hourAgg(rows); let max=Math.max(1,...h.map(x=>x.casais)); return `<div class="heat">${h.map(x=>{let lvl=Math.min(4,Math.floor((x.casais/max)*5)); return `<div class="cell lvl${lvl}"><strong>${x.label}</strong><small>${x.casais} casais • ${x.vendas} vendas • ${pct(x.ef)}</small><div style="font-size:12px;color:var(--muted);margin-top:5px">${money(x.vgv)}</div></div>`}).join('')}</div>`}
function calendar(rows, month){let monthNum=month==='MAIO'?4:5; // JS month index
 let by={}; rows.filter(r=>r.mes===month).forEach(r=>{let d=r.dia;if(!by[d])by[d]={casais:0,vendas:0,vgv:0,notour:0};by[d].casais++;by[d].vendas+=r.vendas;by[d].vgv+=r.valor;by[d].notour+=r.notour;}); let year=2026; let days=month==='MAIO'?31:30; let first=new Date(year,monthNum,1).getDay(); first=(first+6)%7; let cells=[]; for(let i=0;i<first;i++)cells.push('<div class="day empty"></div>'); let vals=Object.values(by).map(x=>x.casais); let max=Math.max(1,...vals); for(let d=1;d<=days;d++){let x=by[d]||{casais:0,vendas:0,vgv:0,notour:0}; let ratio=x.casais/max; let cls=ratio>.66?'good':ratio>.33?'mid':'low'; cells.push(`<div class="day ${cls}" onclick="dayDetails('${month}',${d})"><div class="num">${d}</div><div class="stats">👫 ${x.casais}<br>🛒 ${x.vendas}<br>💰 ${money(x.vgv)}<br>🚫 ${x.notour}</div></div>`)} return `<div class="calendar"><div class="day-head">SEG</div><div class="day-head">TER</div><div class="day-head">QUA</div><div class="day-head">QUI</div><div class="day-head">SEX</div><div class="day-head">SÁB</div><div class="day-head">DOM</div>${cells.join('')}</div>`}
function renderGeral(){let rows=currentRows();let t=totals(rows);let people=aggregate(rows);document.getElementById('geral').innerHTML=`${kpis(t)}<div class="section-title"><div><h3>Equipes lado a lado</h3><p>PARK e EXTERNA com resultados e custo por casal.</p></div></div><div class="grid teams">${teamCard('PARK',rows)}${teamCard('EXTERNA',rows)}</div><div class="section-title"><div><h3>Ranking Geral</h3><p>Clique nos títulos da tabela para ordenar por VGV, casais, vendas, custo de brinde e eficiência.</p></div><div class="tabs"><button class="tab" onclick="setSort('casais')">Casais</button><button class="tab" onclick="setSort('vendas')">Vendas</button><button class="tab" onclick="setSort('vgv')">VGV</button><button class="tab" onclick="setSort('custoCasal')">Custo/Casal</button><button class="tab" onclick="setSort('az')">A-Z</button></div></div>${table(people)}`}
function renderEquipes(){let rows=currentRows();document.getElementById('equipes').innerHTML=`<div class="grid teams">${teamCard('PARK',rows)}${teamCard('EXTERNA',rows)}</div><div id="teamDetail" style="margin-top:18px"></div>`; openTeam('PARK',false)}
function openTeam(team, switchSection=true){if(switchSection){show('equipes')} let rows=currentRows().filter(r=>r.equipe===team); let t=totals(rows); let people=aggregate(rows); let el=document.getElementById('teamDetail'); if(!el)return; el.innerHTML=`<div class="section-title"><div><h3>${team} completo</h3><p>Resumo geral da equipe, ranking interno e todos os profissionais.</p></div></div>${kpis(t)}<div class="grid three" style="margin-top:16px">${podium(people,'Top Casais '+team,'casais')}${podium(people,'Top Vendas '+team,'vendas')}${podium(people,'Menor Custo/Casal '+team,'custoCasal')}</div><div style="margin-top:18px">${table(people)}</div>`}
function renderMonth(month,id){let rows=DATA.filter(r=>r.mes===month);let t=totals(rows);let people=aggregate(rows);document.getElementById(id).innerHTML=`<div class="section-title"><div><h3>${month}</h3><p>Resultados separados do mês.</p></div></div>${kpis(t)}<div class="grid teams" style="margin-top:16px">${teamCard('PARK',rows)}${teamCard('EXTERNA',rows)}</div><div class="section-title"><h3>Ranking ${month}</h3></div>${table(people)}<div class="section-title"><h3>Calendário ${month}</h3></div><div class="card">${calendar(rows,month)}</div>`}
function renderFuncoes(){let rows=currentRows();let prom=aggregate(rows);let lin=aggregateRole(rows,'liner');let clo=aggregateRole(rows,'closer');document.getElementById('funcoes').innerHTML=`<div class="section-title"><div><h3>Separação por função</h3><p>Promotores, liners e closers com ranking próprio.</p></div></div><div class="grid three">${podium(prom,'Top 3 Promotor','vendas')}${podium(lin,'Top 3 Liner','vendas')}${podium(clo,'Top 3 Closer','vendas')}</div><div class="grid" style="margin-top:16px">${roleTable(prom,'Promotores')}${roleTable(lin,'Liners')}${roleTable(clo,'Closers')}</div>`}
function renderTop3(){let rows=currentRows();let prom=aggregate(rows);let lin=aggregateRole(rows,'liner');let clo=aggregateRole(rows,'closer');document.getElementById('top3').innerHTML=`<div class="section-title"><div><h3>Top Performers</h3><p>Aba exclusiva para Top 3 Promotor, Liner e Closer.</p></div></div><div class="grid performers">${podium(prom,'🏆 Top 3 Promotor','vendas')}${podium(lin,'🏆 Top 3 Liner','vendas')}${podium(clo,'🏆 Top 3 Closer','vendas')}</div><div class="grid performers" style="margin-top:16px">${podium(prom,'🥇 Top VGV Promotor','vgv')}${podium(lin,'🥇 Top VGV Liner','vgv')}${podium(clo,'🥇 Top VGV Closer','vgv')}</div>`}
function renderRankings(){let rows=currentRows();let people=aggregate(rows);document.getElementById('rankings').innerHTML=`<div class="section-title"><div><h3>Rankings clicáveis</h3><p>Ordene por qualquer métrica sem mudar a ordem original dos dados.</p></div><div class="tabs"><button class="tab" onclick="setSort('az')">A-Z</button><button class="tab" onclick="setSort('casais')">Casais</button><button class="tab" onclick="setSort('vendas')">Vendas</button><button class="tab" onclick="setSort('vgv')">VGV</button><button class="tab" onclick="setSort('ef')">Eficiência</button><button class="tab" onclick="setSort('brindes')">Brindes</button><button class="tab" onclick="setSort('custoCasal')">Custo/Casal</button><button class="tab" onclick="setSort('notour')">NoTour</button></div></div>${table(people)}`}
function renderHorarios(){let rows=currentRows();let h=hourAgg(rows);let best=[...h].sort((a,b)=>b.casais-a.casais)[0]||{};let worst=[...h].filter(x=>x.casais>0).sort((a,b)=>a.casais-b.casais)[0]||{};document.getElementById('horarios').innerHTML=`<div class="section-title"><div><h3>Mapa de calor por horários</h3><p>Visual maior para identificar melhores e piores horários.</p></div></div><div class="grid two"><div class="card"><h3>Heatmap de horários</h3>${heatmap(rows)}</div><div class="card"><h3>Resumo</h3><div class="mini-grid" style="grid-template-columns:1fr"><div class="mini"><span>Melhor horário por casais</span><b>${best.label||'-'} • ${best.casais||0}</b></div><div class="mini"><span>Pior horário por casais</span><b>${worst.label||'-'} • ${worst.casais||0}</b></div><div class="mini"><span>Melhor horário por vendas</span><b>${([...h].sort((a,b)=>b.vendas-a.vendas)[0]||{}).label||'-'}</b></div></div></div></div><div class="grid two" style="margin-top:16px"><div class="card"><h3>Casais por horário</h3>${barChart(h.map(x=>({label:x.label,value:x.casais})))}</div><div class="card"><h3>Vendas por horário</h3>${barChart(h.map(x=>({label:x.label,value:x.vendas})))}</div></div><div class="grid two" style="margin-top:16px"><div class="card"><h3>VGV por horário</h3>${barChart(h.map(x=>({label:x.label,value:Math.round(x.vgv/1000)}))}<p style="color:var(--muted)">Valores no gráfico em milhares.</p></div><div class="card"><h3>Eficiência por horário</h3>${barChart(h.map(x=>({label:x.label,value:Math.round(x.ef*100)}))}<p style="color:var(--muted)">Valores em percentual.</p></div></div>`}
function renderCalendario(){let rows=currentRows({month:'TODOS'});document.getElementById('calendario').innerHTML=`<div class="section-title"><div><h3>Calendário diário</h3><p>Visual melhorado por mês, com cor conforme resultado.</p></div></div><div class="grid two"><div class="card"><h3>Maio 2026</h3>${calendar(rows,'MAIO')}</div><div class="card"><h3>Junho 2026</h3>${calendar(rows,'JUNHO')}</div></div>`}
function renderProfissionais(){let rows=currentRows();let people=aggregate(rows);document.getElementById('profissionais').innerHTML=`<div class="section-title"><div><h3>Profissionais</h3><p>Clique no nome para abrir o relatório geral da pessoa em uma página só.</p></div></div>${table(people)}`}
function renderMetas(){let rows=currentRows();let t=totals(rows);document.getElementById('metas').innerHTML=`<div class="section-title"><div><h3>Metas da operação</h3><p>Duas abas de acompanhamento: Meta e Super Meta.</p></div></div><div class="grid two"><div class="card"><h3>🎯 Meta da Operação</h3><p style="color:var(--muted)">600 casais e R$ 13 milhões.</p>${progress('Casais',t.casais,META.casais)}${progress('VGV',t.vgv,META.vgv)}</div><div class="card"><h3>🚀 Super Meta da Operação</h3><p style="color:var(--muted)">720 casais e R$ 15 milhões.</p>${progress('Casais',t.casais,META.superCasais,'super')}${progress('VGV',t.vgv,META.superVgv,'super')}</div></div><div class="grid two" style="margin-top:16px"><div class="card"><h3>Projeção Geral</h3><div class="mini-grid"><div class="mini"><span>Casais projetados</span><b>${NUM.format(t.projCasais)}</b></div><div class="mini"><span>VGV projetado</span><b>${money(t.projVgv)}</b></div><div class="mini"><span>Falta p/ meta</span><b>${NUM.format(Math.max(0,META.casais-t.casais))}</b></div><div class="mini"><span>Falta p/ super</span><b>${NUM.format(Math.max(0,META.superCasais-t.casais))}</b></div></div></div><div class="card"><h3>Equipes</h3>${progress('PARK casais',totals(rows.filter(r=>r.equipe==='PARK')).casais,META.casais/2)}${progress('EXTERNA casais',totals(rows.filter(r=>r.equipe==='EXTERNA')).casais,META.casais/2)}${progress('PARK VGV',totals(rows.filter(r=>r.equipe==='PARK')).vgv,META.vgv/2,'super')}${progress('EXTERNA VGV',totals(rows.filter(r=>r.equipe==='EXTERNA')).vgv,META.vgv/2,'super')}</div></div>`}
function openProfile(nameEnc){let name=decodeURIComponent(nameEnc);let rows=currentRows({month:'TODOS'}).filter(r=>r.promotor===name);let allPeople=aggregate(currentRows({month:'TODOS'}));let o=aggregate(rows)[0];if(!o)return;let ranks=sorted(allPeople,'casais');let rankG=ranks.findIndex(x=>x.nome===name)+1;let teamPeople=aggregate(currentRows({month:'TODOS'}).filter(r=>r.equipe===o.equipe));let rankT=sorted(teamPeople,'casais').findIndex(x=>x.nome===name)+1;let byDay={};rows.forEach(r=>{let k=r.data;if(!byDay[k])byDay[k]={label:k.slice(5),value:0,vendas:0,vgv:0};byDay[k].value++;byDay[k].vendas+=r.vendas;byDay[k].vgv+=r.valor});let daily=Object.values(byDay).sort((a,b)=>a.label.localeCompare(b.label));document.getElementById('drawerContent').innerHTML=`<div class="profile-hero"><div class="row"><div class="row" style="justify-content:flex-start"><div class="avatar">${name.split(' ').map(x=>x[0]).slice(0,2).join('')}</div><div><h2 style="margin:0">${name}</h2><p style="color:var(--muted);margin:5px 0 0"><span class="badge ${o.equipe==='PARK'?'park':'ext'}">${o.equipe}</span> Ranking geral #${rankG} • Ranking equipe #${rankT}</p></div></div></div></div><div style="margin-top:16px">${kpis(o)}</div><div class="grid two" style="margin-top:16px"><div class="card"><h3>Relatório da pessoa</h3><div class="mini-grid"><div class="mini"><span>Casais</span><b>${o.casais}</b></div><div class="mini"><span>Vendas</span><b>${o.vendas}</b></div><div class="mini"><span>Ativos</span><b>${o.ativos}</b></div><div class="mini"><span>Cancelados</span><b>${o.cancelados}</b></div><div class="mini"><span>NoTour</span><b>${o.notour}</b></div><div class="mini"><span>VGV</span><b>${money(o.vgv)}</b></div><div class="mini"><span>Brindes</span><b>${money(o.brindes)}</b></div><div class="mini"><span>Custo/Casal</span><b>${money2(o.custoCasal)}</b></div></div><div class="notice">Projeção individual até dia 30: <b>${NUM.format(o.projCasais)} casais</b> e <b>${money(o.projVgv)}</b> em VGV.</div></div><div class="card"><h3>Evolução diária</h3>${barChart(daily,'label','value',18)}</div></div><div class="card" style="margin-top:16px"><h3>Atendimentos deste profissional</h3><div class="table-wrap"><table><thead><tr><th>Data</th><th>Hora</th><th>Equipe</th><th>Local</th><th>Status</th><th>Vendas</th><th>VGV</th><th>NoTour</th><th>Liner</th><th>Closer</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.data}</td><td>${r.hora}</td><td>${r.equipe}</td><td>${r.local}</td><td>${r.statusContrato||r.statusAtendimento}</td><td>${r.vendas}</td><td>${money(r.valor)}</td><td>${r.notour}</td><td>${r.liner}</td><td>${r.closer}</td></tr>`).join('')}</tbody></table></div></div>`;document.getElementById('drawer').classList.add('open')}
function closeDrawer(){document.getElementById('drawer').classList.remove('open')}
function dayDetails(month,day){let rows=DATA.filter(r=>r.mes===month&&r.dia===day);let t=totals(rows);let people=aggregate(rows);document.getElementById('drawerContent').innerHTML=`<h2>${day}/${month==='MAIO'?'05':'06'}/2026</h2>${kpis(t)}<div style="margin-top:16px">${table(people)}</div>`;document.getElementById('drawer').classList.add('open')}
function setSort(s){state.sort=s;renderAll()}
function resetFilters(){state.month='JUNHO';state.search='';document.getElementById('monthSelect').value='JUNHO';document.getElementById('searchInput').value='';renderAll()}
function show(id){state.section=id;document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.id===id));document.getElementById('pageTitle').textContent=NAV.find(x=>x[0]===id)?.[1].replace(/^[^ ]+ /,'')||'Dashboard'; if(id==='maio'){state.month='MAIO';document.getElementById('monthSelect').value='MAIO'} if(id==='junho'){state.month='JUNHO';document.getElementById('monthSelect').value='JUNHO'} renderAll()}
function renderAll(){renderGeral();renderEquipes();renderMonth('MAIO','maio');renderMonth('JUNHO','junho');renderFuncoes();renderTop3();renderRankings();renderHorarios();renderCalendario();renderProfissionais();renderMetas();}
function init(){document.getElementById('nav').innerHTML=NAV.map(([id,label])=>`<button data-id="${id}" onclick="show('${id}')">${label}</button>`).join('');document.querySelector('.nav button').classList.add('active');document.getElementById('monthSelect').value=state.month;document.getElementById('monthSelect').addEventListener('change',e=>{state.month=e.target.value;renderAll()});document.getElementById('searchInput').addEventListener('input',e=>{state.search=e.target.value;renderAll()});renderAll();}
init();
</script></body></html>
